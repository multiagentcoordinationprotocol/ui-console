name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Enable invocation as a reusable workflow (e.g. deploy.yml calls this
  # via `uses: ./.github/workflows/ci.yml`). Without this trigger GitHub
  # rejects the caller at workflow-load time.
  workflow_call:
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: 'Run integration tests'
        type: boolean
        default: false
      run_e2e_tests:
        description: 'Run E2E tests (requires Docker)'
        type: boolean
        default: false
      update_visual_baselines:
        description: 'Regenerate visual baselines for the current OS (manual; upload as artifact — maintainer commits)'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@multiagentcoordinationprotocol'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MACP_UI_DEMO_MODE: 'true'

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  visual-regression:
    name: Visual Regression (demo mode)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@multiagentcoordinationprotocol'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Chromium (with OS deps)
        run: npx playwright install chromium --with-deps

      # Strict mode on normal runs: fails if any baseline snapshot drifts.
      # The first run against a fresh Linux runner will fail because
      # baselines were generated on macOS (-darwin suffix). Use the
      # workflow_dispatch "update_visual_baselines" input to regenerate
      # Linux (-linux suffix) baselines, then commit them from the
      # uploaded artifact.
      - name: Run visual regression tests (strict)
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.update_visual_baselines != 'true'
        run: npm run test:e2e:visual

      # `continue-on-error: true` is the core fix: Playwright exits with
      # code 1 for every test that had to write a new baseline (it
      # reports the initial write as a failed comparison). On the
      # update_visual_baselines=true path that's the intended outcome,
      # not a real failure — so we let the step "fail" without failing
      # the job, and downstream steps see success().
      - name: Regenerate missing visual baselines (manual)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.update_visual_baselines == 'true'
        continue-on-error: true
        run: npx playwright test --config playwright.visual.config.ts --update-snapshots=missing

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: playwright-report/
          retention-days: 14

      - name: Upload snapshot diff images (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: test/e2e/visual/test-results/
          retention-days: 14

      # `always()` is kept as a safety net: the regenerate step uses
      # continue-on-error, so this step should already run in the
      # normal case, but always() ensures the baselines are still
      # uploaded if the step ever times out or errors in an
      # unexpected way.
      - name: Upload regenerated baselines (manual runs only)
        if: >-
          always() &&
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.update_visual_baselines == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux
          path: test/e2e/visual/**/*.png
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration_tests == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@multiagentcoordinationprotocol'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: npm run test:integration

  e2e-tests:
    name: E2E Tests (Full Stack)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e_tests == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e-tests')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ui-console

      - name: Checkout control-plane
        uses: actions/checkout@v4
        with:
          repository: multiagentcoordinationprotocol/control-plane
          path: control-plane

      - name: Checkout examples-service
        uses: actions/checkout@v4
        with:
          repository: multiagentcoordinationprotocol/examples-service
          path: examples-service

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui-console/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@multiagentcoordinationprotocol'

      - name: Install dependencies
        working-directory: ui-console
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Chromium
        working-directory: ui-console
        run: npx playwright install chromium --with-deps

      - name: Start backend services
        working-directory: ui-console
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait
        timeout-minutes: 10

      - name: Run E2E tests
        working-directory: ui-console
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-console/playwright-report/
          retention-days: 14

      - name: Tear down backend services
        if: always()
        working-directory: ui-console
        run: docker compose -f docker-compose.e2e.yml down -v
