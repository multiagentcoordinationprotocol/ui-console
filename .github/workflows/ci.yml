name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Enable invocation as a reusable workflow (e.g. deploy.yml calls this
  # via `uses: ./.github/workflows/ci.yml`). Without this trigger GitHub
  # rejects the caller at workflow-load time.
  workflow_call:
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: 'Run integration tests'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@multiagentcoordinationprotocol'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MACP_UI_DEMO_MODE: 'true'

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration_tests == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@multiagentcoordinationprotocol'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: npm run test:integration

