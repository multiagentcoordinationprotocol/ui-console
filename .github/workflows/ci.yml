name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: 'Run integration tests'
        type: boolean
        default: false
      run_e2e_tests:
        description: 'Run E2E tests (requires Docker)'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MACP_UI_DEMO_MODE: 'true'

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration_tests == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  e2e-tests:
    name: E2E Tests (Full Stack)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e_tests == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e-tests')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ui-console

      - name: Checkout control-plane
        uses: actions/checkout@v4
        with:
          repository: multiagentcoordinationprotocol/control-plane
          path: control-plane

      - name: Checkout examples-service
        uses: actions/checkout@v4
        with:
          repository: multiagentcoordinationprotocol/examples-service
          path: examples-service

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui-console/package-lock.json

      - name: Install dependencies
        working-directory: ui-console
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ui-console
        run: npx playwright install chromium --with-deps

      - name: Start backend services
        working-directory: ui-console
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait
        timeout-minutes: 10

      - name: Run E2E tests
        working-directory: ui-console
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-console/playwright-report/
          retention-days: 14

      - name: Tear down backend services
        if: always()
        working-directory: ui-console
        run: docker compose -f docker-compose.e2e.yml down -v
