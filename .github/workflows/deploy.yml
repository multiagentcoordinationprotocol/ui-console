name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Vercel
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Requires GitHub Environment "production" with required reviewers
    # to gate deployments and protect secrets on public repos.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MACP_UI_DEMO_MODE: ${{ vars.NEXT_PUBLIC_MACP_UI_DEMO_MODE || 'true' }}
          NEXT_PUBLIC_MACP_ENVIRONMENT_LABEL: ${{ vars.NEXT_PUBLIC_MACP_ENVIRONMENT_LABEL || '' }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
